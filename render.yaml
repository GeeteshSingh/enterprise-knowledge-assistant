services:
  - type: web
    name: enterprise-knowledge-assistant
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: DATA_DIR
        value: data
      - key: TOP_K
        value: "5"
      - key: LOG_LEVEL
        value: INFO
    healthCheckPath: /health
    autoDeploy: true
